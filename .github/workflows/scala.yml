name: build

on:
  merge_group:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: [17, 25]
        scala: ['2_12', '2_13', '3']
    env:
      JAVA_OPTS: '-Xmx5G -Xss8M'

    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK
      uses: actions/setup-java@v5.2.0
      with:
        java-version: ${{ matrix.java }}
        distribution: adopt
    - uses: sbt/setup-sbt@v1
    - name: Run tests
      run: |
        case ${{ matrix.scala }} in
          "2_12")
            sbt -v --server '++ 2.12.x' scalafmtSbtCheck scalafmtCheckAll Test/compile test unidoc publishLocal
            ;;
          "2_13")
            sbt -v --server '++ 2.13.x' scalafmtSbtCheck scalafmtCheckAll Test/compile test unidoc publishLocal
            ;;
          "3")
            sbt -v --server '++ 3.x'    scalafmtSbtCheck scalafmtCheckAll Test/compile test unidoc publishLocal
            ;;
          *)
            echo "unknown scala version"
            exit 1
        esac
        git diff --exit-code
